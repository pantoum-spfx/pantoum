# PANTOUM Configuration
# This file contains upgrade definitions and AI contexts
# User settings are in pantoum.settings.yml

manualSteps:
  - id: "M000001"
    enabled: true
    title: "Upgrade @pnp/sp to v4"
    description: "Upgrade pnp sp to 4.17.0 after SPFx upgrade"
    when: post
    condition:
      type: packageVersion
      packageName: "@pnp/sp"
      comparator: "<"
      version: "4.0.0"
    type: updateDependency
    file: package.json
    depType: dependencies
    packageName: "@pnp/sp"
    newVersion: "4.17.0"
    requiresMigrationAnalysis: true
    aiContext: "pnp-to-v4"
  # 1b) Add @pnp/core alongside @pnp/sp — ensures version matches (AI often guesses wrong)
  - id: "M000001A"
    enabled: true
    title: "Add @pnp/core matching @pnp/sp version"
    description: "Add @pnp/core 4.17.0 to ensure it matches @pnp/sp version (not left to AI)"
    when: post
    condition:
      type: packageVersion
      packageName: "@pnp/sp"
      comparator: "<"
      version: "4.0.0"
    type: updateDependency
    file: package.json
    depType: dependencies
    packageName: "@pnp/core"
    newVersion: "4.17.0"
  # 1c) Add @pnp/graph when taxonomy is used — deterministic, not left to AI
  # This ensures the dependency is in package.json before npm install,
  # so the build-fix AI can use it even if the migration AI misses taxonomy
  - id: "M000001B"
    enabled: true
    title: "Add @pnp/graph for taxonomy migration"
    description: "Add @pnp/graph 4.17.0 when taxonomy/termStore usage detected (PnP v3→v4)"
    when: post
    condition:
      type: all
      conditions:
        - type: packageVersion
          packageName: "@pnp/sp"
          comparator: "<"
          version: "4.0.0"
        - type: fileContains
          path: "src/**/*.{ts,tsx}"
          pattern: "@pnp/(sp|graph)/taxonomy|\\.termStore"
          glob: true
    type: updateDependency
    file: package.json
    depType: dependencies
    packageName: "@pnp/graph"
    newVersion: "4.17.0"
# 2) upgrade @pnp/spfx-property-controls to 3.22.0
  - id: "M000002"
    enabled: true
    title: "Upgrade @pnp/spfx-property-controls"
    description: "Upgrade @pnp/spfx-property-controls to 3.22.0 after SPFx upgrade"
    when: post
    condition:
      type: packageVersion
      packageName: "@pnp/spfx-property-controls"
      comparator: "<"
      version: "3.22.0"
    type: updateDependency
    file: package.json
    depType: dependencies
    packageName: "@pnp/spfx-property-controls"
    newVersion: "3.22.0"
# 3) upgrade @pnp/spfx-controls-react to 3.23.0
  - id: "M000003"
    enabled: true
    title: "Upgrade @pnp/spfx-controls-react"
    description: "Upgrade @pnp/spfx-controls-react to 3.23.0 after SPFx upgrade"
    when: post
    condition:
      type: packageVersion
      packageName: "@pnp/spfx-controls-react"
      comparator: "<"
      version: "3.23.0"
    type: updateDependency
    file: package.json
    depType: dependencies
    packageName: "@pnp/spfx-controls-react"
    newVersion: "3.23.0"
  - id: "M000004"
    enabled: true
    title: "Remove es6-promise type reference"
    description: "Remove es6-promise from tsconfig.json"
    when: post
    condition:
      type: fileContains
      path: tsconfig.json
      pattern: "es6-promise"
    type: removeJsonArrayElement
    file: tsconfig.json
    jsonPath:
      - compilerOptions
      - types
    value: es6-promise
    skipIfMissing: true     
  - id: "M000005"
    enabled: true
    title: "Clean node_modules"
    description: "Wipe node_modules clean"
    when: post
    condition:
      type: always
    type: runShellCommand
    command: rm -rf node_modules
    file: .
  # Remove package-lock.json before the upgrade
  - id: "M000006"
    enabled: true
    title: "Delete package-lock.json"
    description: "Delete package-lock.json"
    when: post
    condition:
      type: always
    type: removeFile
    file: package-lock.json
  # Remove api section from serve.json to fix workbench error
  - id: "M000006A"
    enabled: true
    title: "Fix serve.json for workbench"
    description: "Remove api section from config/serve.json to fix workbench error"
    when: post
    condition:
      type: fileContains
      path: config/serve.json
      pattern: "\"api\""
    type: updateJsonSnippet
    file: config/serve.json
    jsonSnippet:
      "$schema": "https://developer.microsoft.com/json-schemas/spfx-build/spfx-serve.schema.json"
      "port": 4321
      "https": true
      "initialPage": "https://{tenantDomain}/_layouts/workbench.aspx"
  # 98) npm install - MOVED TO SUCCESS STEPS
  # - id: "M999998"
  #   description: "npm install to ensure all dependencies are up to date"
  #   when: post
  #   condition:
  #     type: always
  #   type: runShellCommand
  #   command: npm install
  #   file: .
  # Add Graph permissions when upgrading from PnP JS v3 to v4 (termStore moved to Graph)
  # This triggers when @pnp/sp is at the specific v3 version that gets upgraded to v4
  - id: "M000007"
    enabled: true
    title: "Add Graph API permissions for termStore"
    description: "Add Graph API permissions for termStore access (PnP JS v3→v4)"
    when: post
    condition:
      type: all
      conditions:
        - type: packageVersion
          packageName: "@pnp/sp"
          comparator: "<"
          version: "4.0.0"
        - type: fileContains
          path: "src/**/*.{ts,tsx}"
          pattern: "@pnp/(sp|graph)/taxonomy|\\.termStore"
          glob: true
    type: updateJsonSnippet
    file: config/package-solution.json
    jsonSnippet:
      solution:
        webApiPermissionRequests:
          - resource: "Microsoft Graph"
            scope: "TermStore.Read.All"
  # 8) Migrate deprecated React lifecycle methods for React 17+
  # This detects when React 17+ is present and warns about lifecycle method issues
  # NOTE: This is a placeholder - actual migration requires Claude Code to analyze
  # and refactor the specific lifecycle methods in each component
  - id: "M000008"
    enabled: true
    title: "React lifecycle compatibility check"
    description: "Check for React 17+ lifecycle method compatibility"
    when: post
    condition:
      type: all
      conditions:
        - type: packageVersion
          packageName: "react"
          comparator: ">="
          version: "17.0.0"
        - type: fileContains
          path: "src/**/*.{ts,tsx}"
          pattern: "UNSAFE_componentWillMount|UNSAFE_componentWillReceiveProps|UNSAFE_componentWillUpdate"
          glob: true
    type: runShellCommand
    file: .
    command: |
      echo "⚠️  IMPORTANT: React 17+ detected!"
      echo "UNSAFE_ lifecycle methods may not work reliably."
      echo "Consider migrating:"
      echo "  - UNSAFE_componentWillReceiveProps → componentDidUpdate"
      echo "  - UNSAFE_componentWillMount → componentDidMount"
      echo "  - UNSAFE_componentWillUpdate → componentDidUpdate"
      echo "Run with --fixSuccessStepErrors to auto-fix if issues occur."
  # 9) Remove deprecated @microsoft/mgt-spfx package
  - id: "M000009"
    enabled: true
    title: "Remove deprecated mgt-spfx"
    description: "Remove deprecated @microsoft/mgt-spfx package and migrate code"
    when: post
    condition:
      type: packageVersion
      packageName: "@microsoft/mgt-spfx"
      comparator: ">="
      version: "0.0.0"
    type: removeDependency
    file: package.json
    depType: dependencies
    packageName: "@microsoft/mgt-spfx"
    requiresMigrationAnalysis: true
    aiContext: "mgt-spfx-deprecation"
  # 10) Add new MGT packages to replace deprecated mgt-spfx
  - id: "M000010"
