    newVersion: "^3.0.1"
  # 13) Add @microsoft/mgt-spfx-utils for lazy loading support
  - id: "M000013"
    enabled: true
    title: "Add @microsoft/mgt-spfx-utils"
    description: "Add @microsoft/mgt-spfx-utils for lazy loading (required by Microsoft)"
    when: post
    condition:
      type: packageVersion
      packageName: "@microsoft/mgt-spfx"
      comparator: ">="
