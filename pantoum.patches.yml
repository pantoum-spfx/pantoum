    when: post
    condition:
      type: packageVersion
      packageName: "@microsoft/mgt-spfx"
      comparator: ">="
      version: "0.0.0"
    type: updateDependency
    file: package.json
    depType: dependencies
    packageName: "@microsoft/mgt-element"
    newVersion: "^3.0.1"
  - id: "M000011"
    enabled: true
    title: "Add @microsoft/mgt-sharepoint-provider"
    description: "Add @microsoft/mgt-sharepoint-provider package"
    when: post
    condition:
      type: packageVersion
      packageName: "@microsoft/mgt-spfx"
      comparator: ">="
